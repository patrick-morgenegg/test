name: Main Pipeline

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: main-pipeline-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: "lint: lint.yml"
    uses: ./.github/workflows/lint.yml

  test:
    name: "test: test.yml"
    needs: [lint]
    uses: ./.github/workflows/test.yml

  build:
    name: "build: build.yml"
    needs: [test]
    uses: ./.github/workflows/build.yml

  deploy:
    name: "deploy: deploy.yml"
    needs: [build]
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
